<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>HPB Cross-Organ Transfer Learning — 3D Interactive</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--c1:#1f77b4;--c2:#93c5fd;--cg:#9ca3af;--bg:#f8fafc;--navy:#1e3a5f;--green:#16a34a;--red:#dc2626;--border:#dfe3e8}
body{font:13px/1.5 -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;color:#24292f;background:#fff}
header{background:var(--navy);color:#fff;padding:14px 20px;display:flex;justify-content:space-between;align-items:center}
header h1{font:600 15px/1.3 Georgia,serif;letter-spacing:.2px}
header .sub{font-size:10.5px;opacity:.75;margin-top:2px}
header .badge{background:rgba(255,255,255,.15);padding:4px 10px;border-radius:4px;font-size:11px}
.ctrl-bar{display:flex;gap:6px;align-items:center;padding:10px 20px;background:#f6f8fa;border-bottom:1px solid var(--border);flex-wrap:wrap}
.ctrl-bar label{font-weight:600;font-size:12px;color:#57606a;margin-right:2px}
.ctrl-bar .sep{width:1px;height:20px;background:var(--border);margin:0 8px}
.pill{padding:4px 11px;border:1px solid var(--border);border-radius:20px;background:#fff;font-size:11.5px;cursor:pointer;color:#57606a;transition:all .15s}
.pill:hover{border-color:var(--c1);color:var(--c1)}
.pill.on{background:var(--navy);color:#fff;border-color:var(--navy);font-weight:600}
.main{display:grid;grid-template-columns:1fr 260px;height:calc(100vh - 100px);min-height:520px}
.canvas-area{position:relative;background:#f0f2f5;cursor:grab;border-right:1px solid var(--border)}
.canvas-area:active{cursor:grabbing}
#loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--cg);font-size:13px;z-index:5}
.sidebar{overflow-y:auto;padding:12px;background:#fff;font-size:12px}
.card{border:1px solid var(--border);border-radius:6px;padding:10px;margin-bottom:10px}
.card .title{font-weight:700;font-size:12px;color:var(--navy);margin-bottom:6px}
.leg-row{display:flex;align-items:center;gap:7px;margin:3px 0;font-size:11.5px}
.leg-bar{width:20px;height:3px;border-radius:2px;flex-shrink:0}
.match-card{border-radius:6px;padding:10px 12px;margin-bottom:10px;font-weight:700;font-size:13px}
.match-sub{font-weight:400;font-size:11.5px;color:#57606a;margin-top:2px}
.tbl{width:100%;border-collapse:collapse;font-size:11px}
.tbl th{background:#f3f4f6;padding:5px 6px;text-align:left;font-weight:600;border-bottom:1px solid var(--border)}
.tbl td{padding:4px 6px;border-bottom:1px solid #f0f0f0}
.tbl .yes{background:#d1fae5;font-weight:600;color:var(--green)}
.tbl .no{background:#fee2e2;font-weight:600;color:var(--red)}
.mono{font-family:'SF Mono',Menlo,monospace;font-size:10.5px}
.hint{color:#8b949e;font-size:10.5px;margin-top:6px}
</style>
</head>

    const nib=bs===near;if(nib)mc++;

    const bg=TG[`${ep}_${nt}_${t}_${bs}`];
    const fg=TG[`${ep}_${nt}_${t}_${far}`];
    // dist rank of best
    const dists=DOMS.filter(d=>d!==t).map(d=>({d,v:DM[t]?.[d]??999})).sort((a,b)=>a.v-b.v);
    const rank=bs?dists.findIndex(x=>x.d===bs)+1:"-";
    return{t,near,far,bs,nib,ng,bg,fg,rank};
  });

  const bgc=mc>=4?"#d1fae5":mc>=2?"#fffbeb":"#fee2e2";
  let h=`<div class="match-card" style="background:${bgc}">
    Nearest = Best in ${mc}/6 targets
    <div class="match-sub">${EPL[ep]} · n<sub>target</sub> = ${nt}</div></div>`;

  h+=`<div class="card"><div class="title">Arrow legend</div>
    <div class="leg-row"><span class="leg-bar" style="background:var(--c1);height:4px"></span>Nearest = Best ★</div>
    <div class="leg-row"><span class="leg-bar" style="background:var(--c2);height:3px"></span>Nearest ≠ Best</div>
    <div class="leg-row"><span class="leg-bar" style="background:var(--cg);height:2.5px"></span>Farthest (control)</div>
    <div class="hint">Drag to rotate · Scroll to zoom</div></div>`;

  h+=`<div class="card"><div class="title">Per-target breakdown</div><table class="tbl">
    <tr><th>Target</th><th>Best</th><th>Rk</th><th>ΔC</th><th>Match</th></tr>`;
  rows.forEach(r=>{
    h+=`<tr><td>${DL[r.t]}</td><td>${DL[r.bs]||"—"}</td>
      <td>${r.rank===1?"<b>1★</b>":r.rank}</td>
      <td class="mono">${r.bg!==undefined?(r.bg>0?"+":"")+r.bg.toFixed(4):"—"}</td>
      <td class="${r.nib?"yes":"no"}">${r.nib?"✓":"✗"}</td></tr>`;
  });
  h+=`</table>
    <div class="hint" style="margin-top:8px">
      ΔC = C(β<sub>mix</sub>) − C(β̂<sub>target</sub>), mean over 50 splits.
      Nearest/farthest from D<sub>physical</sub> matrix.
    </div></div>`;

  h+=`<div class="card"><div class="title">Distance matrix (D<sub>ab</sub>)</div><table class="tbl">
    <tr><th></th>${DOMS.map(d=>`<th style="font-size:9px">${DL[d].split(" ")[0]}</th>`).join("")}</tr>`;
  DOMS.forEach((r,i)=>{
    h+=`<tr><td style="font-weight:600;font-size:9px">${DL[r].split(" ")[0]}</td>`;
    DOMS.forEach((c,j)=>{
      const v=DM[r]?.[c]??0;
      h+=i===j?`<td style="color:#ccc">—</td>`:`<td class="mono" style="font-size:9.5px">${v.toFixed(3)}</td>`;
    });
    h+=`</tr>`;
  });
  h+=`</table></div>`;

  sb.innerHTML=h;
}

// === 3D Scene ===
function initScene(){
  const wrap=document.getElementById("canvasArea");
  const w=wrap.clientWidth,h=wrap.clientHeight;

  scene=new THREE.Scene();
  scene.background=new THREE.Color(0xf0f2f5);

  camera=new THREE.PerspectiveCamera(38,w/h,1,3000);
  renderer=new THREE.WebGLRenderer({antialias:true,alpha:false});
  renderer.setSize(w,h);
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.outputEncoding=THREE.sRGBEncoding;
  wrap.appendChild(renderer.domElement);

  // Lighting — soft and even
  scene.add(new THREE.AmbientLight(0xffffff,0.55));
  const d1=new THREE.DirectionalLight(0xffffff,0.55);d1.position.set(100,250,200);scene.add(d1);
  const d2=new THREE.DirectionalLight(0xeef2ff,0.3);d2.position.set(-150,100,-100);scene.add(d2);

  grp=new THREE.Group();scene.add(grp);

  // Organ meshes
  ORGANS.forEach(organ=>{
    const m=MS[organ];if(!m)return;
    const geo=new THREE.BufferGeometry();
    const pos=new Float32Array(m.x.length*3);
    for(let i=0;i<m.x.length;i++){pos[i*3]=m.x[i];pos[i*3+1]=m.y[i];pos[i*3+2]=m.z[i]}
    geo.setAttribute("position",new THREE.BufferAttribute(pos,3));
    const idx=new Uint32Array(m.i.length*3);
    for(let i=0;i<m.i.length;i++){idx[i*3]=m.i[i];idx[i*3+1]=m.j[i];idx[i*3+2]=m.k[i]}
    geo.setIndex(new THREE.BufferAttribute(idx,1));
    geo.computeVertexNormals();
    const s=OS[organ]||{c:0xcccccc,o:0.1};
    const mat=new THREE.MeshPhongMaterial({color:s.c,transparent:true,opacity:s.o,side:THREE.DoubleSide,depthWrite:false,flatShading:true,shininess:20});
    grp.add(new THREE.Mesh(geo,mat));
  });

  // Domain markers
  DOMS.forEach(d=>{
    const p=A[d];if(!p)return;
    const sg=new THREE.SphereGeometry(3.5,20,14);
    const sm=new THREE.MeshPhongMaterial({color:0xffffff,emissive:DC[d]||0x888888,emissiveIntensity:0.4});
    const sp=new THREE.Mesh(sg,sm);sp.position.set(p[0],p[1],p[2]);
    // Outline ring
    const rg=new THREE.RingGeometry(4.5,5.5,24);
    const rm=new THREE.MeshBasicMaterial({color:DC[d]||0x888888,side:THREE.DoubleSide});
    const ring=new THREE.Mesh(rg,rm);ring.position.set(p[0],p[1],p[2]);
    ring.lookAt(camera.position);
    grp.add(sp);grp.add(ring);
    // Label sprite
    const cv=document.createElement("canvas");cv.width=320;cv.height=72;
    const ctx=cv.getContext("2d");
    ctx.font="bold 30px -apple-system,BlinkMacSystemFont,sans-serif";
    ctx.textAlign="center";ctx.fillStyle="#1e293b";
    ctx.fillText(DL[d],160,45);
    const tex=new THREE.CanvasTexture(cv);tex.encoding=THREE.sRGBEncoding;
    const spr=new THREE.Sprite(new THREE.SpriteMaterial({map:tex,transparent:true}));
    spr.position.set(p[0],p[1]+12,p[2]);spr.scale.set(32,7.2,1);
    grp.add(spr);
  });

  arrowGrp=new THREE.Group();grp.add(arrowGrp);

  // Camera position — look at centroid
  const pts=Object.values(A);
  const cx=pts.reduce((s,p)=>s+p[0],0)/pts.length;
  const cy=pts.reduce((s,p)=>s+p[1],0)/pts.length;
  const cz=pts.reduce((s,p)=>s+p[2],0)/pts.length;
  camera.position.set(cx+160,cy+100,cz+160);
  camera.lookAt(cx,cy,cz);

  // Interaction
  const el=renderer.domElement;
  const dn=e=>{drag=true;const t=e.touches?e.touches[0]:e;px=t.clientX;py=t.clientY};
  const mv=e=>{if(!drag)return;e.preventDefault();const t=e.touches?e.touches[0]:e;
    grp.rotation.y+=(t.clientX-px)*0.005;grp.rotation.x+=(t.clientY-py)*0.005;px=t.clientX;py=t.clientY};
  const up=()=>drag=false;
  el.addEventListener("mousedown",dn);el.addEventListener("touchstart",dn,{passive:false});
  window.addEventListener("mousemove",mv);window.addEventListener("touchmove",mv,{passive:false});
  window.addEventListener("mouseup",up);window.addEventListener("touchend",up);
  // Zoom
  el.addEventListener("wheel",e=>{e.preventDefault();
    camera.position.lerp(grp.position,e.deltaY>0?-0.05:0.05);
  },{passive:false});
  // Resize
  window.addEventListener("resize",()=>{
    const w2=wrap.clientWidth,h2=wrap.clientHeight;
    camera.aspect=w2/h2;camera.updateProjectionMatrix();renderer.setSize(w2,h2);
  });

  document.getElementById("loading").style.display="none";
  updateScene();
  (function anim(){requestAnimationFrame(anim);renderer.render(scene,camera)})();
}

function mkArrow(from,to,color,thick,op){
  const f=new THREE.Vector3(...from),t=new THREE.Vector3(...to);
  const dir=new THREE.Vector3().subVectors(t,f);
  const len=dir.length();if(len<1)return;
  const nd=dir.clone().normalize();
  const up=new THREE.Vector3(0,1,0);
  const mat=new THREE.MeshPhongMaterial({color,transparent:op<1,opacity:op,flatShading:false});
  // Shaft
  const sg=new THREE.CylinderGeometry(thick,thick,len*.8,8);
  const shaft=new THREE.Mesh(sg,mat);
  shaft.position.copy(new THREE.Vector3().lerpVectors(f,t,.4));
  shaft.quaternion.setFromUnitVectors(up,nd);
  arrowGrp.add(shaft);
  // Cone
  const cg=new THREE.ConeGeometry(thick*2.8,len*.16,10);
  const cone=new THREE.Mesh(cg,mat.clone());
  cone.position.copy(new THREE.Vector3().lerpVectors(f,t,.88));
  cone.quaternion.setFromUnitVectors(up,nd);
  arrowGrp.add(cone);
}

function updateScene(){
  while(arrowGrp.children.length)arrowGrp.remove(arrowGrp.children[0]);
  DOMS.forEach(t=>{
    const{near,far}=nearFar(t);
    const bs=bestSrc(ep,nt,t);
    const nib=bs===near;
    if(A[near]&&A[t]) mkArrow(A[near],A[t],nib?0x1f77b4:0x93c5fd,nib?2:1.1,nib?1:.55);
    if(A[far]&&A[t]) mkArrow(A[far],A[t],0x9ca3af,.8,.4);
  });
  renderSidebar();
}

// Boot
renderCtrl();
initScene();
</script>
